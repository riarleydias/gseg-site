<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" role="img" aria-label="GSEG — selo circular (carimbo)">
  <title>GSEG — Selo circular</title>
  <desc>Versao carimbo: monograma G ao centro, anel com o texto GSEG · ENGENHARIA DE SEGURANCA DO TRABALHO ao redor. Verde-floresta #32472B. Refino vetorial fiel ao selo do portfolio (pg-9). O texto do anel usa fonte Cinzel via import; para arte-final, converter em curvas a partir do arquivo da cliente.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;display=swap');</style>
    <!-- Caminho circular para o texto (sentido horario, comeca no topo) -->
    <path id="anelTexto" fill="none" d="M210,210 m-150,0 a150,150 0 1,1 300,0 a150,150 0 1,1 -300,0"/>
    <path id="anelBaixo" fill="none" d="M210,210 m-150,0 a150,150 0 1,0 300,0 a150,150 0 1,0 -300,0"/>
  </defs>

  <!-- Aneis decorativos -->
  <circle cx="210" cy="210" r="200" fill="none" stroke="#32472B" stroke-width="2"/>
  <circle cx="210" cy="210" r="174" fill="none" stroke="#32472B" stroke-width="6"/>
  <circle cx="210" cy="210" r="120" fill="none" stroke="#32472B" stroke-width="2"/>

  <!-- Texto no anel superior -->
  <text fill="#32472B" font-family="'Cinzel',Georgia,serif" font-weight="600" font-size="20" letter-spacing="3">
    <textPath href="#anelTexto" startOffset="25%" text-anchor="middle">GSEG · ENGENHARIA DE SEGURANÇA DO TRABALHO</textPath>
  </text>
  <!-- Texto no anel inferior (CREA), invertido para ficar legivel embaixo -->
  <text fill="#32472B" font-family="'Cinzel',Georgia,serif" font-weight="600" font-size="16" letter-spacing="4">
    <textPath href="#anelBaixo" startOffset="25%" text-anchor="middle">CREA 332747/MG · ARAXÁ-MG</textPath>
  </text>

  <!-- Estrelas separadoras (esq/dir, na linha do centro) -->
  <g fill="#32472B">
    <path d="M40,210 l3,7 7,1 -5,5 1,7 -6,-4 -6,4 1,-7 -5,-5 7,-1 z"/>
    <path d="M380,210 l3,7 7,1 -5,5 1,7 -6,-4 -6,4 1,-7 -5,-5 7,-1 z"/>
  </g>

  <!-- Monograma G central (versao traçada, sem placa) -->
  <g transform="translate(210,210)">
    <g fill="#32472B">
      <path fill-rule="evenodd" d="M0 -78 a78 78 0 1 0 0 156 a78 78 0 1 0 0 -156 Z M0 -44 a44 44 0 1 1 0 88 a44 44 0 1 1 0 -88 Z"/>
    </g>
    <!-- abre a boca do G (recorta em creme = cor de fundo do papel) -->
    <g fill="#F2F1EC"><rect x="0" y="-21" width="92" height="42"/></g>
    <g fill="#32472B">
      <rect x="-6" y="-10" width="64" height="18" rx="2"/>
      <rect x="40" y="-10" width="18" height="33" rx="2"/>
    </g>
  </g>
</svg>
