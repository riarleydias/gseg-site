<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="GSEG — símbolo G (negativo)">
  <title>GSEG — Símbolo G (negativo)</title>
  <desc>Letra G geométrica ISOLADA em branco puro #FFFFFF, recortes transparentes — para fundos escuros/verde-floresta ou foto com overlay. Fiel ao símbolo do portfólio GSEG.</desc>
  <defs>
    <mask id="gneg">
      <rect width="240" height="240" fill="#000"/>
      <circle cx="120" cy="120" r="78" fill="#fff"/>
      <circle cx="120" cy="120" r="44" fill="#000"/>
      <rect x="120" y="99" width="92" height="42" fill="#000"/>
      <rect x="114" y="110" width="64" height="18" rx="2" fill="#fff"/>
      <rect x="160" y="110" width="18" height="33" rx="2" fill="#fff"/>
    </mask>
  </defs>
  <rect width="240" height="240" fill="#FFFFFF" mask="url(#gneg)"/>
</svg>
